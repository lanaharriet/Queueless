<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirm Order</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

.container{
background:white;
width:400px;
margin:auto;
margin-top:80px;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.item{
display:flex;
justify-content:space-between;
margin:8px 0;
}

.total{
font-size:20px;
font-weight:bold;
margin-top:15px;
}

button{
padding:12px 25px;
background:#28a745;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

input{
padding:8px;
width:80%;
margin-top:10px;
font-size:16px;
}

@media (max-width:600px){

body{
padding:10px;
}

h1{
font-size:22px;
}

table{
width:100%;
font-size:14px;
}

button{
width:100%;
padding:14px;
font-size:16px;
}

input{
width:100%;
padding:10px;
font-size:16px;
}

.card{
width:100%;
}

}

</style>

</head>

<body>

<div class="container">

<h2>Confirm Your Order</h2>

{% for item in items %}

<div class="item">
<span>{{ item.name }} × {{ item.quantity }}</span>
<span>₹ {{ item.subtotal }}</span>
</div>

{% endfor %}

<div class="total">
Total: ₹ {{ total }}
</div>

<form action="/order/" method="POST">
{% csrf_token %}

<br>

<input type="text" name="customer_name" placeholder="Enter your name" required>

<br><br>

<button type="submit">Place Final Order</button>

</form>

</div>

</body>

</html>
