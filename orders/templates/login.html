<!DOCTYPE html>
<html>

<head>
<title>Dashboard Login</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

.login-box{
background:white;
width:300px;
margin:auto;
margin-top:120px;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
padding:10px;
width:80%;
margin:10px 0;
}

button{
padding:10px 20px;
background:#2c7be5;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Dashboard Login</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<br>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
