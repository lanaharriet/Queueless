<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Control</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

h1{
margin-top:20px;
}

.container{
width:90%;
margin:auto;
margin-top:30px;
}

.item{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.available{
color:#27ae60;
font-weight:bold;
}

.sold{
color:#e74c3c;
font-weight:bold;
}

button{
padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.toggle{
background:#2c7be5;
color:white;
}

</style>
</head>

<body>

<h1>Kitchen Control Panel</h1>

<div class="container">

{% for item in items %}

<div class="item">

<div>
<strong>{{ item.name }}</strong><br>

{% if item.is_available %}
<span class="available">Available</span>
{% else %}
<span class="sold">Sold Out</span>
{% endif %}

</div>

<a href="/toggle-item/{{ item.id }}/">
<button class="toggle">Toggle</button>
</a>

</div>

{% endfor %}

</div>

</body>
</html>
