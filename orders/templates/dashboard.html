<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canteen Dashboard</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

.stats{
display:flex;
justify-content:center;
gap:40px;
margin-top:40px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
width:200px;
}

.card h3{
margin:0;
color:#2c7be5;
}

table{
margin:auto;
margin-top:40px;
background:white;
border-collapse:collapse;
width:500px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

th,td{
padding:15px;
border-bottom:1px solid #ddd;
}

th{
background:#2c7be5;
color:white;
}

@media (max-width:600px){

body{
padding:10px;
}

h1{
font-size:22px;
}

table{
width:100%;
overflow-x:auto;
display:block;
}

button{
width:100%;
padding:14px;
font-size:16px;
}

input{
width:100%;
padding:10px;
font-size:16px;
}

.card{
width:100%;
}

}
</style>

</head>

<body>

<h2>Vincent De Paul Canteen Dashboard</h2>

<div class="stats">

<div class="card">
<h3>{{ total_orders }}</h3>
<p>Total Orders</p>
</div>

<div class="card">
<h3>₹ {{ total_revenue }}</h3>
<p>Total Revenue</p>
</div>

</div>

<table>

<tr>
<th>Item</th>
<th>Quantity Ordered</th>
<th>Revenue</th>
</tr>

{% for item in summary %}

<tr>
<td>{{ item.name }}</td>
<td>{{ item.total }}</td>
<td>₹ {{ item.revenue }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
